# K=N (K=5): skip elimination phase, immediate endgame Best-1 collapse
experiment:
  name: "K=N (K=5)"
  N: 5
  K: 5

providers:
  - name: "qwen3.6-flash"
    type: "openai"
    model: "qwen3.6-flash"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
  - name: "deepseek-v4-flash"
    type: "openai"
    model: "deepseek-v4-flash"
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
  - name: "kimi-k2.6"
    type: "openai"
    model: "kimi-k2.6"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
  - name: "glm-5.1"
    type: "openai"
    model: "glm-5.1"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
  - name: "qwen3.6-27b"
    type: "openai"
    model: "qwen3.6-27b"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"

debate_params:
  alpha: 0.5
  gamma: 0.3

dataset:
  source: "newfacade/LeetCodeDataset"
  subset_size: 10
  random_seed: 99
