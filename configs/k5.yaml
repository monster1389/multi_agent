    type: "openai"
    model: "deepseek-v4-flash"
    base_url: "https://api.deepseek.com"
    api_key: "${DEEPSEEK_API_KEY}"
  - name: "kimi-k2.6"
    type: "openai"
    model: "kimi-k2.6"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
  - name: "glm-5.2"
    type: "openai"
    model: "glm-5.2"
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    api_key: "${DASHSCOPE_API_KEY}"
  - name: "qwen3.7-max-preview"
    type: "openai"
